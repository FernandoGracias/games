<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Falling Sand</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; }
.toolbar { display: flex; gap: 4px; padding: 6px; background: #222; flex-wrap: wrap; align-items: center; }
.btn { padding: 6px 10px; border: 2px solid #444; border-radius: 6px; background: #333; color: #eee; cursor: pointer; font-size: 12px; user-select: none; }
.btn.active { border-color: #fff; background: #555; }
.btn:hover { background: #444; }
.size-label { color: #aaa; font-size: 11px; margin-left: 8px; }
.source-label { color: #aaa; font-size: 11px; margin-left: 8px; display: flex; align-items: center; gap: 4px; }
.source-label input { cursor: pointer; }
canvas { flex: 1; image-rendering: pixelated; }
#cursor { position: fixed; pointer-events: none; border: 1.5px solid rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%); z-index: 999; }
</style>
</head>
<body>
<div class="toolbar">
  <button class="btn active" data-el="sand">Sand</button>
  <button class="btn" data-el="water">Water</button>
  <button class="btn" data-el="grass_seed">Grass</button>
  <button class="btn" data-el="vine_seed">Vine</button>
  <button class="btn" data-el="tree_seed">Tree</button>
  <button class="btn" data-el="fire">Fire</button>
  <button class="btn" data-el="oil">Oil</button>
  <button class="btn" data-el="wood">Wood</button>
  <button class="btn" data-el="stone">Stone</button>
  <button class="btn" data-el="salt">Salt</button>
  <button class="btn" data-el="soil">Soil</button>
  <button class="btn" data-el="eraser">Eraser</button>
  <span class="size-label">Size: <input type="range" id="brushSize" min="0" max="12" value="3" style="vertical-align:middle;width:60px;"></span>
  <label class="source-label"><input type="checkbox" id="sourceMode"> Source</label>
  <label class="source-label"><input type="checkbox" id="rainMode"> Rain</label>
  <button class="btn" id="clearBtn" style="margin-left:auto;">Clear</button>
</div>
<canvas id="c"></canvas>
<div id="cursor"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

const SCALE = 3;
let W, H, grid, sources, updated;

function resize() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  W = Math.floor(canvas.width / SCALE);
  H = Math.floor(canvas.height / SCALE);
  grid = new Uint8Array(W * H);
  sources = new Uint8Array(W * H);
  updated = new Uint8Array(W * H);
}
resize();
window.addEventListener('resize', () => { resize(); });

// Element types
const EMPTY = 0, SAND = 1, WATER = 2, FIRE = 3, OIL = 4, WOOD = 5, STONE = 6, SALT = 7, STEAM = 8;
const GRASS_SEED = 9, VINE_SEED = 10, TREE_SEED = 11;
const GRASS = 12, VINE = 13, TRUNK = 14, LEAF = 15, FLOWER = 16;
const SOIL = 17, WET_SOIL = 18, ROOT = 19, SAPLING = 20, APPLE = 21;

function getColor(type) {
  switch(type) {
    case SAND: return [194, 178, 128];
    case WATER: return [30, 100, 200];
    case FIRE: return [255, 150 + (Math.random()*80|0), 0];
    case OIL: return [60, 40, 80];
    case WOOD: return [100, 70, 30];
    case STONE: return [120, 120, 120];
    case SALT: return [230, 230, 240];
    case STEAM: return [200, 200, 220];
    case GRASS_SEED: return [140, 180, 60];
    case VINE_SEED: return [80, 160, 80];
    case TREE_SEED: return [120, 90, 50];
    case GRASS: return [30, 180, 50];
    case VINE: return [0, 140, 40];
    case TRUNK: return [80, 55, 20];
    case LEAF: return [20, 150, 30];
    case FLOWER: return [220, 80, 160];
    case SOIL: return [90, 60, 30];
    case WET_SOIL: return [55, 35, 15];
    case ROOT: return [140, 100, 50];
    case SAPLING: return [60, 130, 30];
    case APPLE: return [200, 30, 30];
    default: return [0, 0, 0];
  }
}

function isFlammable(t) { return t === GRASS || t === VINE || t === WOOD || t === OIL || t === LEAF || t === TRUNK || t === FLOWER || t === GRASS_SEED || t === VINE_SEED || t === TREE_SEED || t === ROOT || t === SAPLING || t === APPLE; }

function idx(x, y) { return y * W + x; }
function inBounds(x, y) { return x >= 0 && x < W && y >= 0 && y < H; }
function get(x, y) { return inBounds(x, y) ? grid[idx(x, y)] : STONE; }
function set(x, y, v) { if (inBounds(x, y)) grid[idx(x, y)] = v; }
function isEmpty(x, y) { return get(x, y) === EMPTY; }
function isLiquid(x, y) { const t = get(x, y); return t === WATER || t === OIL; }
function swap(x1, y1, x2, y2) {
  const i1 = idx(x1, y1), i2 = idx(x2, y2);
  const tmp = grid[i1]; grid[i1] = grid[i2]; grid[i2] = tmp;
}

let tick = 0;

function simulate() {
  tick++;
  updated.fill(0);

  // Sources emit with pressure physics (BFS to find nearest empty reachable through liquid)
  for (let i = 0; i < sources.length; i++) {
    if (!sources[i]) continue;
    const srcType = sources[i];
    if (grid[i] === EMPTY) {
      grid[i] = srcType;
      continue;
    }
    // Only water/oil have pressure
    if (srcType !== WATER && srcType !== OIL) continue;
    if (grid[i] !== srcType) continue;

    // BFS: find nearest empty cell reachable through connected same-type liquid
    const sx = i % W, sy = (i / W) | 0;
    const visited = new Uint8Array(W * H);
    const queue = [[sx, sy]];
    visited[i] = 1;
    let found = false;
    let steps = 0;
    const maxSteps = 200; // cap search to avoid perf issues

    while (queue.length > 0 && steps < maxSteps) {
      steps++;
      const [cx, cy] = queue.shift();
      // Check neighbors: down first, then sides, then up (priority order)
      const neighbors = [[cx, cy+1], [cx-1, cy], [cx+1, cy], [cx, cy-1]];
      for (const [nx, ny] of neighbors) {
        if (!inBounds(nx, ny)) continue;
        const ni = idx(nx, ny);
        if (visited[ni]) continue;
        visited[ni] = 1;
        const cell = grid[ni];
        if (cell === EMPTY) {
          grid[ni] = srcType;
          found = true;
          break;
        }
        if (cell === srcType) queue.push([nx, ny]);
        // Oil can also path through water
        if (srcType === OIL && cell === WATER) queue.push([nx, ny]);
      }
      if (found) break;
    }
  }

  const dir = tick % 2 === 0 ? 1 : -1;
  const startX = dir === 1 ? 0 : W - 1;

  for (let y = H - 1; y >= 0; y--) {
    for (let i = 0; i < W; i++) {
      const x = startX + i * dir;
      if (!inBounds(x, y)) continue;
      const ci = idx(x, y);
      if (updated[ci]) continue;
      const type = grid[ci];
      if (type === EMPTY) continue;

      switch(type) {
        case SAND: updateSand(x, y); break;
        case WATER: updateWater(x, y); break;
        case FIRE: updateFire(x, y); break;
        case OIL: updateOil(x, y); break;
        case STEAM: updateSteam(x, y); break;
        case SALT: updateSalt(x, y); break;
        case GRASS_SEED: updateGrassSeed(x, y); break;
        case VINE_SEED: updateVineSeed(x, y); break;
        case TREE_SEED: updateTreeSeed(x, y); break;
        case GRASS: updateGrass(x, y); break;
        case VINE: updateVine(x, y); break;
        case SOIL: updateSoil(x, y); break;
        case WET_SOIL: updateWetSoil(x, y); break;
        case SAPLING: updateSapling(x, y); break;
        case APPLE: updateApple(x, y); break;
      }
    }
  }
}

function fall(x, y, canDisplace) {
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); updated[idx(x, y + 1)] = 1; return true; }
  if (canDisplace && isLiquid(x, y + 1)) { swap(x, y, x, y + 1); updated[idx(x, y + 1)] = 1; return true; }
  const d = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + d, y + 1)) { swap(x, y, x + d, y + 1); updated[idx(x + d, y + 1)] = 1; return true; }
  if (isEmpty(x - d, y + 1)) { swap(x, y, x - d, y + 1); updated[idx(x - d, y + 1)] = 1; return true; }
  if (canDisplace) {
    if (isLiquid(x + d, y + 1)) { swap(x, y, x + d, y + 1); updated[idx(x + d, y + 1)] = 1; return true; }
    if (isLiquid(x - d, y + 1)) { swap(x, y, x - d, y + 1); updated[idx(x - d, y + 1)] = 1; return true; }
  }
  return false;
}

function flowSide(x, y, spread) {
  const d = Math.random() < 0.5 ? -1 : 1;
  for (let i = 1; i <= spread; i++) {
    if (isEmpty(x + d * i, y)) { swap(x, y, x + d * i, y); updated[idx(x + d * i, y)] = 1; return true; }
    if (get(x + d * i, y) !== EMPTY) break;
  }
  for (let i = 1; i <= spread; i++) {
    if (isEmpty(x - d * i, y)) { swap(x, y, x - d * i, y); updated[idx(x - d * i, y)] = 1; return true; }
    if (get(x - d * i, y) !== EMPTY) break;
  }
  return false;
}

function updateSand(x, y) { fall(x, y, true); }
function updateSalt(x, y) {
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++)
      if (get(x + dx, y + dy) === WATER && Math.random() < 0.02) { set(x, y, EMPTY); return; }
  fall(x, y, true);
}
function updateWater(x, y) { if (!fall(x, y, false)) flowSide(x, y, 2); }
function updateOil(x, y) {
  if (get(x, y + 1) === WATER) { swap(x, y, x, y + 1); updated[idx(x, y + 1)] = 1; return; }
  if (!fall(x, y, false)) flowSide(x, y, 2);
}

// Seeds fall like sand (less dense) then sprout when wet
function updateGrassSeed(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const n = get(x + dx, y + dy);
      if (n === WATER) {
        set(x + dx, y + dy, EMPTY);
        set(x, y, GRASS);
        return;
      }
      if (n === WET_SOIL) {
        set(x, y, GRASS);
        // Grow roots down
        let ry = y + 1;
        for (let r = 0; r < 4; r++) {
          const rx = x + (Math.random() < 0.3 ? (Math.random() < 0.5 ? -1 : 1) : 0);
          if (inBounds(rx, ry) && (get(rx, ry) === SOIL || get(rx, ry) === WET_SOIL || isEmpty(rx, ry))) set(rx, ry, ROOT);
          else break;
          ry++;
        }
        return;
      }
    }
  }
  fall(x, y, true);
}

function updateVineSeed(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const n = get(x + dx, y + dy);
      if (n === WATER) { set(x + dx, y + dy, EMPTY); set(x, y, VINE); return; }
      if (n === WET_SOIL) {
        set(x, y, VINE);
        let ry = y + 1;
        for (let r = 0; r < 4; r++) {
          const rx = x + (Math.random() < 0.3 ? (Math.random() < 0.5 ? -1 : 1) : 0);
          if (inBounds(rx, ry) && (get(rx, ry) === SOIL || get(rx, ry) === WET_SOIL || isEmpty(rx, ry))) set(rx, ry, ROOT);
          else break;
          ry++;
        }
        return;
      }
    }
  }
  fall(x, y, true);
}

function updateTreeSeed(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const n = get(x + dx, y + dy);
      if (n === WATER || n === WET_SOIL) {
        if (n === WATER) set(x + dx, y + dy, EMPTY);
        set(x, y, SAPLING); // Become a sapling, grows over time
        // Grow roots
        let ry = y + 1;
        for (let r = 0; r < 6; r++) {
          const rx = x + (Math.random() < 0.4 ? (Math.random() < 0.5 ? -1 : 1) : 0);
          if (inBounds(rx, ry) && (get(rx, ry) === SOIL || get(rx, ry) === WET_SOIL || isEmpty(rx, ry))) set(rx, ry, ROOT);
          else break;
          ry++;
        }
        return;
      }
    }
  }
  fall(x, y, true);
}

// Apple: stays in tree canopy, falls if unsupported
function updateApple(x, y) {
  // Check if any leaf or trunk neighbor supports it
  let supported = false;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const n = get(x + dx, y + dy);
      if (n === LEAF || n === TRUNK) { supported = true; break; }
    }
    if (supported) break;
  }
  if (!supported) fall(x, y, true);
}

// Sapling: grows upward gradually into a tree, needs water to keep growing
function updateSapling(x, y) {
  // Count trunk below to determine current height
  let height = 0;
  for (let dy = 1; dy < 40; dy++) {
    if (get(x, y + dy) === TRUNK) height++;
    else break;
  }

  // Growth slows as tree gets taller — never stops entirely
  const growChance = Math.max(0.01, 0.06 / (1 + height * 0.08));
  if (Math.random() > growChance) return;

  // Need water/wet soil nearby to grow
  let waterFound = false;
  for (let dx = -3; dx <= 3 && !waterFound; dx++) {
    for (let dy2 = -3; dy2 <= 3 && !waterFound; dy2++) {
      if (get(x + dx, y + dy2) === WATER || get(x + dx, y + dy2) === WET_SOIL) waterFound = true;
    }
  }
  if (!waterFound) return;

  const isPine = ((x * 31) % 2) === 0;

  // Grow upward
  if (isEmpty(x, y - 1)) {
    set(x, y, TRUNK);
    set(x, y - 1, SAPLING);
    updated[idx(x, y - 1)] = 1;

    // As tree grows, add foliage at current level
    if (isPine) {
      // Pine: add needle layers as it grows — wider at bottom, narrow at top
      if (height > 2) {
        const layerWidth = Math.max(1, Math.min(3, Math.floor(height * 0.4)));
        for (let lx = -layerWidth; lx <= layerWidth; lx++) {
          if (lx !== 0 && isEmpty(x + lx, y) && Math.random() < 0.7) set(x + lx, y, LEAF);
        }
      }
    } else {
      // Apple/deciduous: add leaves in a rounder cluster near the top
      if (height > 3) {
        const r = Math.min(4, 1 + Math.floor(height * 0.25));
        for (let dx = -r; dx <= r; dx++) {
          if (dx !== 0 && isEmpty(x + dx, y) && Math.random() < 0.4) {
            if (Math.random() < 0.06) set(x + dx, y, APPLE);
            else set(x + dx, y, LEAF);
          }
        }
      }
    }
  } else {
    // Blocked — add leaves around the tip
    set(x, y, LEAF);
  }
}

// Grown grass is static, occasionally flowers, grows more when watered
function updateGrass(x, y) {
  if (Math.random() > 0.08) return;

  // Water passes through grass — move it below or to the side
  if (get(x, y - 1) === WATER) {
    if (isEmpty(x, y + 1)) {
      set(x, y + 1, WATER);
      set(x, y - 1, EMPTY);
    } else if (isEmpty(x - 1, y)) {
      set(x - 1, y, WATER);
      set(x, y - 1, EMPTY);
    } else if (isEmpty(x + 1, y)) {
      set(x + 1, y, WATER);
      set(x, y - 1, EMPTY);
    }
    return;
  }

  // Determine height above ground (count grass/soil/root below)
  let heightAboveGround = 0;
  for (let dy = 1; dy <= 4; dy++) {
    const below = get(x, y + dy);
    if (below === GRASS || below === FLOWER) heightAboveGround++;
    else break;
  }

  // Max height 3 — don't grow up past that
  const maxHeight = 3;

  // Look for adjacent water to consume and grow
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const n = get(x + dx, y + dy);
      if (n === WATER) {
        // Grow sideways (strongly preferred) or up if below max height
        if (Math.random() < 0.7 && (isEmpty(x - 1, y) || isEmpty(x + 1, y))) {
          // Grow sideways
          const d = isEmpty(x - 1, y) && isEmpty(x + 1, y) ? (Math.random() < 0.5 ? -1 : 1) : (isEmpty(x - 1, y) ? -1 : 1);
          set(x + d, y, GRASS);
          updated[idx(x + d, y)] = 1;
        } else if (heightAboveGround < maxHeight && isEmpty(x, y - 1)) {
          // Grow up
          set(x, y - 1, GRASS);
          updated[idx(x, y - 1)] = 1;
        }
        // Consume the water
        set(x + dx, y + dy, EMPTY);
        return;
      }
    }
  }
  // Occasional wildflower on top
  if (Math.random() < 0.003 && isEmpty(x, y - 1) && get(x, y + 1) === GRASS) {
    set(x, y - 1, FLOWER);
  }
}

// Vine grows aggressively in all directions when water nearby
// Vine: single-pixel strings that climb upward, occasionally branch
function updateVine(x, y) {
  // Water passes through vine — move water below if possible
  if (get(x, y - 1) === WATER) {
    if (isEmpty(x, y + 1)) {
      set(x, y + 1, WATER);
      set(x, y - 1, EMPTY);
    } else if (isEmpty(x - 1, y)) {
      set(x - 1, y, WATER);
      set(x, y - 1, EMPTY);
    } else if (isEmpty(x + 1, y)) {
      set(x + 1, y, WATER);
      set(x, y - 1, EMPTY);
    }
    return;
  }

  if (Math.random() > 0.04) return;

  // Only grow from true tips — cells with exactly 1 vine neighbor (endpoints)
  let vineNeighbors = 0;
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++)
      if ((dx || dy) && get(x + dx, y + dy) === VINE) vineNeighbors++;

  // Strict: only endpoints grow. Very rare branching from non-tips.
  if (vineNeighbors > 1 && Math.random() > 0.01) return;

  // Need water within 2 cells to grow
  let hasWater = false;
  for (let dx = -2; dx <= 2 && !hasWater; dx++)
    for (let dy = -2; dy <= 2 && !hasWater; dy++)
      if (get(x + dx, y + dy) === WATER) hasWater = true;
  if (!hasWater) return;

  // Strongly prefer up. Climb surfaces.
  let hasSurface = false;
  for (let dx = -1; dx <= 1; dx += 2) {
    const n = get(x + dx, y);
    if (n !== EMPTY && n !== VINE && n !== WATER && n !== GRASS) hasSurface = true;
  }

  // Growth direction: almost always up
  if (isEmpty(x, y - 1) && Math.random() < (hasSurface ? 0.85 : 0.7)) {
    set(x, y - 1, VINE); updated[idx(x, y - 1)] = 1;
  } else {
    // Occasionally branch sideways or diagonal-up
    const sides = [];
    if (isEmpty(x - 1, y - 1)) sides.push([-1, -1]);
    if (isEmpty(x + 1, y - 1)) sides.push([1, -1]);
    if (isEmpty(x - 1, y)) sides.push([-1, 0]);
    if (isEmpty(x + 1, y)) sides.push([1, 0]);
    if (sides.length > 0) {
      const [dx, dy] = sides[Math.random() * sides.length | 0];
      set(x + dx, y + dy, VINE); updated[idx(x + dx, y + dy)] = 1;
    }
  }
  // Consume a nearby water cell
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++)
      if (get(x + dx, y + dy) === WATER) { set(x + dx, y + dy, EMPTY); return; }
}

// Soil: falls like sand, absorbs water on contact
function updateSoil(x, y) {
  // Check for adjacent water — absorb it (slowly)
  if (Math.random() < 0.1) {
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        if (get(x + dx, y + dy) === WATER) {
          set(x + dx, y + dy, EMPTY);
          set(x, y, WET_SOIL);
          return;
        }
      }
    }
  }
  fall(x, y, true);
}

// Wet soil: passes moisture downward to dry soil, triggers seeds to sprout with roots
function updateWetSoil(x, y) {
  if (Math.random() > 0.05) return;
  // Check for adjacent seeds — sprout them with roots growing down
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const n = get(x + dx, y + dy);
      if (n === GRASS_SEED || n === VINE_SEED || n === TREE_SEED) {
        if (n === GRASS_SEED) set(x + dx, y + dy, GRASS);
        else if (n === VINE_SEED) set(x + dx, y + dy, VINE);
        else {
          set(x + dx, y + dy, SAPLING);
        }
        let ry = y + 1;
        for (let r = 0; r < 5; r++) {
          const rx = x + (Math.random() < 0.3 ? (Math.random() < 0.5 ? -1 : 1) : 0);
          if (inBounds(rx, ry) && (get(rx, ry) === SOIL || get(rx, ry) === WET_SOIL || isEmpty(rx, ry))) {
            set(rx, ry, ROOT);
          } else break;
          ry++;
        }
        set(x, y, SOIL);
        return;
      }
    }
  }
  // Spread moisture: down first, then sideways
  if (get(x, y + 1) === SOIL) {
    set(x, y + 1, WET_SOIL);
    set(x, y, SOIL);
    updated[idx(x, y + 1)] = 1;
  } else {
    // Below is already wet or stone — spread sideways
    const d = Math.random() < 0.5 ? -1 : 1;
    if (get(x + d, y) === SOIL) {
      set(x + d, y, WET_SOIL);
      set(x, y, SOIL);
      updated[idx(x + d, y)] = 1;
    } else if (get(x - d, y) === SOIL) {
      set(x - d, y, WET_SOIL);
      set(x, y, SOIL);
      updated[idx(x - d, y)] = 1;
    }
    // If fully surrounded by wet soil, just stay wet (moisture is saturated)
  }
}

function updateFire(x, y) {
  let nearWood = false;
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++)
      if (get(x + dx, y + dy) === WOOD || get(x + dx, y + dy) === TRUNK) nearWood = true;

  const dieChance = nearWood ? 0.02 : 0.15;
  if (Math.random() < dieChance) { set(x, y, EMPTY); return; }

  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const n = get(x + dx, y + dy);
      if (n === WATER) { set(x, y, STEAM); return; }
      if (isFlammable(n)) {
        let spreadChance = 0.4;
        if (n === WOOD || n === TRUNK) spreadChance = 0.04;
        else if (n === OIL) spreadChance = 0.6;
        if (Math.random() < spreadChance) {
          set(x + dx, y + dy, FIRE);
          updated[idx(x + dx, y + dy)] = 1;
        }
      }
    }
  }
  if (isEmpty(x, y - 1) && Math.random() < 0.4) { swap(x, y, x, y - 1); updated[idx(x, y - 1)] = 1; }
}

function updateSteam(x, y) {
  if (Math.random() < 0.02) { set(x, y, EMPTY); return; }
  if (Math.random() < 0.01) { set(x, y, WATER); return; }
  if (isEmpty(x, y - 1)) { swap(x, y, x, y - 1); updated[idx(x, y - 1)] = 1; }
  else {
    const d = Math.random() < 0.5 ? -1 : 1;
    if (isEmpty(x + d, y)) { swap(x, y, x + d, y); updated[idx(x + d, y)] = 1; }
  }
}

// Drawing
let drawing = false;
let resizing = false;
let resizeStartX = 0;
let resizeStartSize = 0;
let currentElement = SAND;
let lastPaintX = -1, lastPaintY = -1;
let lastRawX = -1, lastRawY = -1;
const elementMap = { sand: SAND, water: WATER, grass_seed: GRASS_SEED, vine_seed: VINE_SEED, tree_seed: TREE_SEED, fire: FIRE, oil: OIL, wood: WOOD, stone: STONE, salt: SALT, soil: SOIL, eraser: EMPTY };

document.querySelectorAll('.btn[data-el]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn[data-el]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentElement = elementMap[btn.dataset.el];
  });
});

document.getElementById('clearBtn').addEventListener('click', () => { grid.fill(0); sources.fill(0); });

function getBrushSize() { return parseInt(document.getElementById('brushSize').value); }

function paintAt(cx, cy) {
  const r = getBrushSize();
  const isSource = document.getElementById('sourceMode').checked;
  const isSeed = currentElement === GRASS_SEED || currentElement === VINE_SEED || currentElement === TREE_SEED;
  if (r === 0) {
    if (inBounds(cx, cy)) {
      if (isSeed && Math.random() > 0.15) return; // Sparse seed dispensing
      if (isSource) {
        sources[idx(cx, cy)] = currentElement;
        if (grid[idx(cx, cy)] === EMPTY) grid[idx(cx, cy)] = currentElement;
      } else if (currentElement === EMPTY) {
        set(cx, cy, EMPTY); sources[idx(cx, cy)] = 0;
      } else if (get(cx, cy) === EMPTY || currentElement === FIRE) {
        set(cx, cy, currentElement);
      }
    }
    return;
  }
  for (let dx = -r; dx <= r; dx++) {
    for (let dy = -r; dy <= r; dy++) {
      if (dx * dx + dy * dy <= r * r) {
        if (isSeed && Math.random() > 0.15) continue; // Sparse seed dispensing
        const px = cx + dx, py = cy + dy;
        if (inBounds(px, py)) {
          if (isSource) {
            sources[idx(px, py)] = currentElement;
            if (grid[idx(px, py)] === EMPTY) grid[idx(px, py)] = currentElement;
          } else if (currentElement === EMPTY) {
            set(px, py, EMPTY); sources[idx(px, py)] = 0;
          } else if (get(px, py) === EMPTY || currentElement === FIRE) {
            set(px, py, currentElement);
          }
        }
      }
    }
  }
}

function paint(ex, ey) {
  const rect = canvas.getBoundingClientRect();
  const cx = (ex - rect.left) / SCALE | 0;
  const cy = (ey - rect.top) / SCALE | 0;
  if (lastPaintX >= 0) {
    const dx = cx - lastPaintX, dy = cy - lastPaintY;
    const steps = Math.max(Math.abs(dx), Math.abs(dy));
    for (let i = 0; i <= steps; i++) {
      const t = steps === 0 ? 0 : i / steps;
      paintAt(lastPaintX + (dx * t) | 0, lastPaintY + (dy * t) | 0);
    }
  } else {
    paintAt(cx, cy);
  }
  lastPaintX = cx; lastPaintY = cy;
}

// Cursor
function updateCursor(x, y) {
  const r = getBrushSize();
  const diameter = Math.max((r * 2 + 1) * SCALE, SCALE);
  cursorEl.style.left = x + 'px';
  cursorEl.style.top = y + 'px';
  cursorEl.style.width = diameter + 'px';
  cursorEl.style.height = diameter + 'px';
  if (currentElement === EMPTY) {
    cursorEl.style.borderColor = 'rgba(255,100,100,0.8)';
  } else {
    const [cr, cg, cb] = getColor(currentElement);
    cursorEl.style.borderColor = `rgba(${cr},${cg},${cb},0.9)`;
  }
}

canvas.addEventListener('mousedown', (e) => {
  if (e.ctrlKey || e.metaKey) { resizing = true; resizeStartX = e.clientX; resizeStartSize = getBrushSize(); return; }
  drawing = true; lastPaintX = -1; lastPaintY = -1; lastRawX = e.clientX; lastRawY = e.clientY; paint(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', (e) => {
  updateCursor(e.clientX, e.clientY);
  if (resizing) { const d = Math.round((e.clientX - resizeStartX) / 8); document.getElementById('brushSize').value = Math.max(0, Math.min(12, resizeStartSize + d)); updateCursor(e.clientX, e.clientY); return; }
  if (drawing) { lastRawX = e.clientX; lastRawY = e.clientY; paint(e.clientX, e.clientY); }
});
canvas.addEventListener('mouseup', () => { drawing = false; resizing = false; lastPaintX = -1; lastPaintY = -1; });
canvas.addEventListener('mouseleave', () => { drawing = false; resizing = false; lastPaintX = -1; lastPaintY = -1; cursorEl.style.display = 'none'; });
canvas.addEventListener('mouseenter', (e) => { cursorEl.style.display = 'block'; updateCursor(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; lastPaintX = -1; lastPaintY = -1; lastRawX = e.touches[0].clientX; lastRawY = e.touches[0].clientY; paint(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (drawing) { lastRawX = e.touches[0].clientX; lastRawY = e.touches[0].clientY; paint(e.touches[0].clientX, e.touches[0].clientY); } }, {passive: false});
canvas.addEventListener('touchend', () => { drawing = false; lastPaintX = -1; lastPaintY = -1; });

canvas.style.cursor = 'none';

// Render
const imgData = ctx.createImageData(canvas.width, canvas.height);

function render() {
  const data = imgData.data;
  data.fill(0);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = idx(x, y);
      const type = grid[i];
      if (type === EMPTY && !sources[i]) continue;
      let r, g, b;
      if (type !== EMPTY) { [r, g, b] = getColor(type); }
      else { [r, g, b] = getColor(sources[i]); }
      if (sources[i]) { r = Math.min(255, r + 40); g = Math.min(255, g + 40); b = Math.min(255, b + 40); }
      for (let sy = 0; sy < SCALE; sy++) {
        for (let sx = 0; sx < SCALE; sx++) {
          const pi = ((y * SCALE + sy) * canvas.width + (x * SCALE + sx)) * 4;
          data[pi] = r; data[pi+1] = g; data[pi+2] = b; data[pi+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function loop() {
  if (drawing && lastRawX >= 0) {
    const rect = canvas.getBoundingClientRect();
    paintAt((lastRawX - rect.left) / SCALE | 0, (lastRawY - rect.top) / SCALE | 0);
  }
  // Rain
  if (document.getElementById('rainMode').checked) {
    for (let i = 0; i < Math.ceil(W * 0.02); i++) {
      const rx = Math.random() * W | 0;
      if (grid[idx(rx, 0)] === EMPTY) grid[idx(rx, 0)] = WATER;
    }
  }
  simulate(); simulate();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
