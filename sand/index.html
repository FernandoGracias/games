<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Falling Sand</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; }
.toolbar { display: flex; gap: 4px; padding: 6px; background: #222; flex-wrap: wrap; align-items: center; }
.btn { padding: 6px 10px; border: 2px solid #444; border-radius: 6px; background: #333; color: #eee; cursor: pointer; font-size: 12px; user-select: none; }
.btn.active { border-color: #fff; background: #555; }
.btn:hover { background: #444; }
.size-label { color: #aaa; font-size: 11px; margin-left: 8px; }
.source-label { color: #aaa; font-size: 11px; margin-left: 8px; display: flex; align-items: center; gap: 4px; }
.source-label input { cursor: pointer; }
canvas { flex: 1; image-rendering: pixelated; cursor: none; }
#cursor { position: fixed; pointer-events: none; border: 1.5px solid rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%); z-index: 999; }
</style>
</head>
<body>
<div class="toolbar">
  <button class="btn active" data-el="sand">Sand</button>
  <button class="btn" data-el="water">Water</button>
  <button class="btn" data-el="oil">Oil</button>
  <button class="btn" data-el="fire">Fire</button>
  <button class="btn" data-el="stone">Stone</button>
  <button class="btn" data-el="wood">Wood</button>
  <button class="btn" data-el="salt">Salt</button>
  <button class="btn" data-el="soil">Soil</button>
  <button class="btn" data-el="grass_seed">Grass</button>
  <button class="btn" data-el="vine_seed">Vine</button>
  <button class="btn" data-el="tree_seed">Tree</button>
  <button class="btn" data-el="powder">Powder</button>
  <button class="btn" data-el="eraser">Eraser</button>
  <span class="size-label">Size: <input type="range" id="brushSize" min="0" max="20" value="3" style="vertical-align:middle;width:60px;"></span>
  <label class="source-label"><input type="checkbox" id="sourceMode"> Source</label>
  <label class="source-label"><input type="checkbox" id="rainMode"> Rain</label>
  <button class="btn" id="clearBtn" style="margin-left:auto;">Clear</button>
</div>
<canvas id="c"></canvas>
<div id="cursor"></div>
<script>
// High-performance falling sand — offscreen 1:1 canvas, GPU-scaled via drawImage
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const cursorEl = document.getElementById('cursor');

const SCALE = 3;
let W, H, grid, sources, fireAge, offscreen, octx, imgData, buf32;

function resize() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  W = Math.floor(canvas.width / SCALE);
  H = Math.floor(canvas.height / SCALE);
  grid = new Uint8Array(W * H);
  sources = new Uint8Array(W * H);
  fireAge = new Uint16Array(W * H);
  offscreen = new OffscreenCanvas(W, H);
  octx = offscreen.getContext('2d', { alpha: false });
  imgData = octx.createImageData(W, H);
  buf32 = new Uint32Array(imgData.data.buffer);
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

// Element types
const EMPTY=0,SAND=1,WATER=2,OIL=3,FIRE=4,STONE=5,WOOD=6,SALT=7,SOIL=8;
const GRASS_SEED=9,VINE_SEED=10,TREE_SEED=11,GRASS=12,VINE=13,TRUNK=14;
const LEAF=15,FLOWER=16,STEAM=17,WET_SOIL=18,ROOT=19,SAPLING=20,APPLE=21,POWDER=22,CHARCOAL=23,EMBER=24;

// ABGR packed colors (little-endian Uint32)
const COLORS = new Uint32Array(32);
COLORS[EMPTY]     = 0xFF000000;
COLORS[SAND]      = 0xFF80B2C2;
COLORS[WATER]     = 0xFFC8641E;
COLORS[OIL]       = 0xFF50283C;
COLORS[FIRE]      = 0xFF0096FF;
COLORS[STONE]     = 0xFF787878;
COLORS[WOOD]      = 0xFF1E4664;
COLORS[SALT]      = 0xFFF0E6E6;
COLORS[SOIL]      = 0xFF1E3C5A;
COLORS[GRASS_SEED]= 0xFF3CB48C;
COLORS[VINE_SEED] = 0xFF50A050;
COLORS[TREE_SEED] = 0xFF325A78;
COLORS[GRASS]     = 0xFF32B41E;
COLORS[VINE]      = 0xFF288C00;
COLORS[TRUNK]     = 0xFF143750;
COLORS[LEAF]      = 0xFF1E9614;
COLORS[FLOWER]    = 0xFFA050DC;
COLORS[STEAM]     = 0xFFDCC8C8;
COLORS[WET_SOIL]  = 0xFF0F2337;
COLORS[ROOT]      = 0xFF32648C;
COLORS[SAPLING]   = 0xFF1E823C;
COLORS[APPLE]     = 0xFF1E1EC8;
COLORS[POWDER]    = 0xFF303030;
COLORS[CHARCOAL]  = 0xFF1A1A1A;
COLORS[EMBER]     = 0xFF0020A0;

const STATIC = new Uint8Array(32);
STATIC[STONE]=1; STATIC[WOOD]=1; STATIC[TRUNK]=1; STATIC[LEAF]=1; STATIC[FLOWER]=1; STATIC[ROOT]=1;

function get(x, y) { return (x >= 0 && x < W && y >= 0 && y < H) ? grid[y * W + x] : STONE; }
function set(x, y, v) { if (x >= 0 && x < W && y >= 0 && y < H) grid[y * W + x] = v; }
function isEmpty(x, y) { return get(x, y) === EMPTY; }
function isLiquid(t) { return t === WATER || t === OIL; }

let tick = 0;
const rng = () => Math.random();

// --- SIMULATION ---
function simulate() {
  tick++;
  const dir = tick & 1;

  // Sources — just emit when cell is empty
  for (let i = 0; i < sources.length; i++) {
    if (sources[i] && grid[i] === EMPTY) grid[i] = sources[i];
  }

  // Rain
  if (document.getElementById('rainMode').checked) {
    for (let i = 0; i < Math.ceil(W * 0.02); i++) {
      const rx = rng() * W | 0;
      if (grid[rx] === EMPTY) grid[rx] = WATER;
    }
  }

  // Main sim loop — bottom to top
  for (let y = H - 1; y >= 0; y--) {
    const startX = dir ? 0 : W - 1;
    const endX = dir ? W : -1;
    const step = dir ? 1 : -1;
    for (let x = startX; x !== endX; x += step) {
      const i = y * W + x;
      const t = grid[i];
      if (t === EMPTY || STATIC[t]) continue;

      switch (t) {
        case SAND: simSand(x, y, i); break;
        case WATER: simWater(x, y, i); break;
        case OIL: simOil(x, y, i); break;
        case FIRE: simFire(x, y, i); break;
        case SALT: simSalt(x, y, i); break;
        case SOIL: simSoil(x, y, i); break;
        case WET_SOIL: simWetSoil(x, y, i); break;
        case STEAM: simSteam(x, y, i); break;
        case GRASS_SEED: simGrassSeed(x, y, i); break;
        case VINE_SEED: simVineSeed(x, y, i); break;
        case TREE_SEED: simTreeSeed(x, y, i); break;
        case GRASS: simGrass(x, y, i); break;
        case VINE: simVine(x, y, i); break;
        case SAPLING: simSapling(x, y, i); break;
        case APPLE: simApple(x, y, i); break;
        case POWDER: fall(x, y, i, true); break;
        case CHARCOAL: if(rng()<0.01) { grid[i]=EMBER; fireAge[i]=0; } break;
        case EMBER: fireAge[i]++; if(fireAge[i] > 300 + ((i*7)%420)) grid[i]=EMPTY; break;
      }
    }
  }
}

function swap(i1, i2) { const t = grid[i1]; grid[i1] = grid[i2]; grid[i2] = t; }

function fall(x, y, i, displaceFluid) {
  const below = y + 1 < H ? grid[i + W] : STONE;
  if (below === EMPTY) { swap(i, i + W); return true; }
  if (displaceFluid && isLiquid(below)) { swap(i, i + W); return true; }
  const d = rng() < 0.5 ? 1 : -1;
  const bx1 = x + d, bx2 = x - d;
  if (bx1 >= 0 && bx1 < W && y+1 < H) {
    const ni = i + W + d;
    if (grid[ni] === EMPTY) { swap(i, ni); return true; }
    if (displaceFluid && isLiquid(grid[ni])) { swap(i, ni); return true; }
  }
  if (bx2 >= 0 && bx2 < W && y+1 < H) {
    const ni = i + W - d;
    if (grid[ni] === EMPTY) { swap(i, ni); return true; }
    if (displaceFluid && isLiquid(grid[ni])) { swap(i, ni); return true; }
  }
  return false;
}

function flowSide(x, y, i) {
  const d = rng() < 0.5 ? 1 : -1;
  if (x+d >= 0 && x+d < W && grid[i+d] === EMPTY) { swap(i, i+d); return true; }
  if (x-d >= 0 && x-d < W && grid[i-d] === EMPTY) { swap(i, i-d); return true; }
  return false;
}

function simSand(x,y,i) { fall(x,y,i,true); }
function simSalt(x,y,i) {
  // Dissolve in water
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    if (get(x+dx,y+dy)===WATER && rng()<0.02) { grid[i]=EMPTY; return; }
  }
  fall(x,y,i,true);
}

function simWater(x,y,i) {
  if (!fall(x,y,i,false)) { flowSide(x,y,i); }
}

function simOil(x,y,i) {
  // Oil is lighter than water, sand, soil, salt — rise through them if they're above
  if (y>0) {
    const a=grid[i-W];
    if (a===WATER||a===SAND||a===SOIL||a===WET_SOIL||a===SALT) { swap(i, i-W); return; }
  }
  // Fall into empty space
  if (y+1<H && grid[i+W]===EMPTY) { swap(i, i+W); return; }
  // Diagonal fall into empty
  const d = rng()<0.5?1:-1;
  if (y+1<H && x+d>=0 && x+d<W && grid[i+W+d]===EMPTY) { swap(i, i+W+d); return; }
  if (y+1<H && x-d>=0 && x-d<W && grid[i+W-d]===EMPTY) { swap(i, i+W-d); return; }
  // Flow sideways into empty
  flowSide(x,y,i);
}

function simFire(x,y,i) {
  fireAge[i]++;
  const age = fireAge[i];

  // Check what's around
  let nearOil=false, nearWood=false;
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    const n=get(x+dx,y+dy);
    if (n===OIL) nearOil=true;
    if (n===WOOD||n===TRUNK||n===CHARCOAL) nearWood=true;
  }

  // Water extinguishes
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    if (get(x+dx,y+dy)===WATER) { grid[i]=STEAM; fireAge[i]=0; return; }
  }
  // Powder explodes
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    if (get(x+dx,y+dy)===POWDER && rng()<0.8) { explode(x+dx,y+dy); fireAge[i]=0; return; }
  }

  // Die logic
  if (nearOil) {
    // Never dies near oil
  } else if (nearWood) {
    // Burns a long time on wood, then becomes charcoal
    if (age > 600) { grid[i]=CHARCOAL; fireAge[i]=0; return; }
  } else {
    // Free fire — open flame, lasts a while
    if (rng()<0.04) { grid[i]=EMPTY; fireAge[i]=0; return; }
  }

  // Spread to flammables
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    if (!dx&&!dy) continue;
    const n=get(x+dx,y+dy);
    if (n===OIL && rng()<0.3) { set(x+dx,y+dy,FIRE); fireAge[(y+dy)*W+(x+dx)]=0; }
    else if ((n===WOOD||n===TRUNK) && rng()<0.02) { set(x+dx,y+dy,CHARCOAL); }
    else if (n===CHARCOAL && rng()<0.02) { set(x+dx,y+dy,FIRE); fireAge[(y+dy)*W+(x+dx)]=0; }
    else if ((n===GRASS||n===VINE||n===LEAF||n===FLOWER||n===ROOT||n===SAPLING||n===APPLE) && rng()<0.3) { set(x+dx,y+dy,FIRE); fireAge[(y+dy)*W+(x+dx)]=0; }
  }

  // Char adjacent wood (additional charring beyond spread)
  if (nearWood && rng()<0.03) {
    for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
      const n=get(x+dx,y+dy);
      if ((n===WOOD||n===TRUNK) && rng()<0.3) set(x+dx,y+dy,CHARCOAL);
    }
  }

  // Fire rises — open flame only when fueled, otherwise just drifts up
  if (y>0 && grid[i-W]===EMPTY) {
    if ((nearWood || nearOil) && rng()<0.5) { grid[i-W]=FIRE; fireAge[i-W]=0; }
    else if (!nearWood && !nearOil && rng()<0.3) { swap(i, i-W); const tmp=fireAge[i]; fireAge[i]=fireAge[i-W]; fireAge[i-W]=tmp; }
  }
}

function explode(cx, cy) {
  // Check confinement — count solid neighbors in a small radius
  let solids = 0, total = 0;
  for (let dy=-3;dy<=3;dy++) for (let dx=-3;dx<=3;dx++) {
    total++;
    const n = get(cx+dx, cy+dy);
    if (n!==EMPTY && n!==FIRE && n!==STEAM) solids++;
  }
  const confinement = solids / total; // 0=open air, 1=fully enclosed

  if (confinement < 0.3) {
    // Open air — just rapid combustion, no blast damage
    for (let dy=-2;dy<=2;dy++) for (let dx=-2;dx<=2;dx++) {
      const nx=cx+dx,ny=cy+dy;
      if (nx>=0&&nx<W&&ny>=0&&ny<H) {
        const ni=ny*W+nx;
        if (grid[ni]===POWDER) { grid[ni]=FIRE; fireAge[ni]=0; }
      }
    }
    return;
  }

  // Confined — destructive explosion, radius scales with confinement
  const radius = Math.floor(3 + confinement * 5);
  for (let dy=-radius;dy<=radius;dy++) for (let dx=-radius;dx<=radius;dx++) {
    if (dx*dx+dy*dy > radius*radius) continue;
    const nx=cx+dx, ny=cy+dy;
    if (nx<0||nx>=W||ny<0||ny>=H) continue;
    const ni=ny*W+nx;
    const n=grid[ni];
    if (n===STONE) continue;
    if (n===POWDER) { grid[ni]=FIRE; fireAge[ni]=0; continue; }
    if (rng()<0.7) grid[ni]=EMPTY;
    else if (rng()<0.4) { grid[ni]=FIRE; fireAge[ni]=0; }
  }
}

function simSteam(x,y,i) {
  if (rng()<0.02) { grid[i]=EMPTY; return; }
  if (rng()<0.01) { grid[i]=WATER; return; }
  if (y>0 && grid[i-W]===EMPTY) swap(i, i-W);
  else flowSide(x,y,i);
}

function simSoil(x,y,i) {
  if (rng() < 0.1) {
    for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
      if (get(x+dx,y+dy)===WATER) { set(x+dx,y+dy,EMPTY); grid[i]=WET_SOIL; return; }
    }
  }
  fall(x,y,i,true);
}

function simWetSoil(x,y,i) {
  if (rng()>0.05) return;
  // Sprout seeds
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    const n=get(x+dx,y+dy);
    if (n===GRASS_SEED) { set(x+dx,y+dy,GRASS); grid[i]=SOIL; return; }
    if (n===VINE_SEED) { set(x+dx,y+dy,VINE); grid[i]=SOIL; return; }
    if (n===TREE_SEED) { set(x+dx,y+dy,SAPLING); grid[i]=SOIL; return; }
  }
  // Spread moisture
  if (y+1<H && grid[i+W]===SOIL) { grid[i+W]=WET_SOIL; grid[i]=SOIL; }
  else {
    const d = rng()<0.5?1:-1;
    if (x+d>=0&&x+d<W&&grid[i+d]===SOIL) { grid[i+d]=WET_SOIL; grid[i]=SOIL; }
    else if (x-d>=0&&x-d<W&&grid[i-d]===SOIL) { grid[i-d]=WET_SOIL; grid[i]=SOIL; }
  }
}

function simGrassSeed(x,y,i) {
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    const n=get(x+dx,y+dy);
    if (n===WATER) { set(x+dx,y+dy,EMPTY); grid[i]=GRASS; return; }
    if (n===WET_SOIL) { grid[i]=GRASS; return; }
  }
  fall(x,y,i,true);
}
function simVineSeed(x,y,i) {
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    const n=get(x+dx,y+dy);
    if (n===WATER) { set(x+dx,y+dy,EMPTY); grid[i]=VINE; return; }
    if (n===WET_SOIL) { grid[i]=VINE; return; }
  }
  fall(x,y,i,true);
}
function simTreeSeed(x,y,i) {
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    const n=get(x+dx,y+dy);
    if (n===WATER||n===WET_SOIL) { if(n===WATER)set(x+dx,y+dy,EMPTY); grid[i]=SAPLING; return; }
  }
  fall(x,y,i,true);
}

function simGrass(x,y,i) {
  if (rng()>0.08) return;
  // Water passes through
  if (y>0 && grid[i-W]===WATER) {
    if (y+1<H && grid[i+W]===EMPTY) { grid[i+W]=WATER; grid[i-W]=EMPTY; }
    else if (x>0&&grid[i-1]===EMPTY) { grid[i-1]=WATER; grid[i-W]=EMPTY; }
    else if (x+1<W&&grid[i+1]===EMPTY) { grid[i+1]=WATER; grid[i-W]=EMPTY; }
    return;
  }
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    if (get(x+dx,y+dy)===WATER) {
      set(x+dx,y+dy,EMPTY);
      // Grow sideways preferred
      if (rng()<0.7) {
        const d=rng()<0.5?-1:1;
        if (isEmpty(x+d,y)) set(x+d,y,GRASS);
      } else if (isEmpty(x,y-1)) set(x,y-1,GRASS);
      return;
    }
  }
  if (rng()<0.003 && isEmpty(x,y-1)) set(x,y-1,FLOWER);
}

function simVine(x,y,i) {
  if (y>0 && grid[i-W]===WATER) {
    if (y+1<H&&grid[i+W]===EMPTY){grid[i+W]=WATER;grid[i-W]=EMPTY;}
    else if(x>0&&grid[i-1]===EMPTY){grid[i-1]=WATER;grid[i-W]=EMPTY;}
    else if(x+1<W&&grid[i+1]===EMPTY){grid[i+1]=WATER;grid[i-W]=EMPTY;}
    return;
  }
  if (rng()>0.04) return;
  // Only tips grow
  let vn=0;
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) if((dx||dy)&&get(x+dx,y+dy)===VINE) vn++;
  if (vn>1 && rng()>0.01) return;
  // Need water nearby
  let hw=false;
  for (let dy=-2;dy<=2&&!hw;dy++) for (let dx=-2;dx<=2&&!hw;dx++) if(get(x+dx,y+dy)===WATER) hw=true;
  if (!hw) return;
  // Grow up strongly
  if (isEmpty(x,y-1)&&rng()<0.8) { set(x,y-1,VINE); }
  else {
    const sides=[];
    if(isEmpty(x-1,y-1))sides.push([-1,-1]);
    if(isEmpty(x+1,y-1))sides.push([1,-1]);
    if(isEmpty(x-1,y))sides.push([-1,0]);
    if(isEmpty(x+1,y))sides.push([1,0]);
    if(sides.length){const[dx,dy]=sides[rng()*sides.length|0];set(x+dx,y+dy,VINE);}
  }
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)if(get(x+dx,y+dy)===WATER){set(x+dx,y+dy,EMPTY);return;}
}

function simSapling(x,y,i) {
  let height=0;
  for(let dy=1;dy<40;dy++){if(get(x,y+dy)===TRUNK)height++;else break;}
  const growChance=Math.max(0.01,0.06/(1+height*0.08));
  if(rng()>growChance) return;
  let hw=false;
  for(let dy=-3;dy<=3&&!hw;dy++)for(let dx=-3;dx<=3&&!hw;dx++)if(get(x+dx,y+dy)===WATER||get(x+dx,y+dy)===WET_SOIL)hw=true;
  if(!hw)return;
  const isPine=((x*31)%2)===0;
  if(isEmpty(x,y-1)){
    grid[i]=TRUNK; set(x,y-1,SAPLING);
    if(height>2){
      if(isPine){const w=Math.max(1,Math.min(3,(height*0.4)|0));for(let lx=-w;lx<=w;lx++)if(lx&&isEmpty(x+lx,y)&&rng()<0.7)set(x+lx,y,LEAF);}
      else if(height>3){const r=Math.min(4,1+(height*0.25)|0);for(let dx=-r;dx<=r;dx++)if(dx&&isEmpty(x+dx,y)&&rng()<0.4)set(x+dx,y,rng()<0.06?APPLE:LEAF);}
    }
  } else { grid[i]=LEAF; }
}

function simApple(x,y,i) {
  let sup=false;
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const n=get(x+dx,y+dy);if(n===LEAF||n===TRUNK){sup=true;break;}}
  if(!sup) fall(x,y,i,true);
}

// --- RENDER (GPU-scaled) ---
function render() {
  const len = W * H;
  for (let i = 0; i < len; i++) {
    const t = grid[i];
    if (t === FIRE) {
      // Varied fire: deep red → orange → yellow → white-hot
      const v = rng();
      let r, g, b;
      if (v < 0.25) { r=200+(rng()*55|0); g=20+(rng()*40|0); b=0; }        // deep red
      else if (v < 0.55) { r=255; g=80+(rng()*80|0); b=0; }                 // orange
      else if (v < 0.8) { r=255; g=180+(rng()*75|0); b=0; }                 // yellow
      else { r=255; g=220+(rng()*35|0); b=100+(rng()*100|0); }              // white-hot
      buf32[i] = 0xFF000000 | (b << 16) | (g << 8) | r;
    } else if (t === EMBER) {
      const r=120+(rng()*80|0), g=20+(rng()*30|0);
      buf32[i] = 0xFF000000 | (g << 8) | r;
    } else if (sources[i] && t === EMPTY) {
      const c = COLORS[sources[i]];
      buf32[i] = (c & 0xFF000000) | (Math.min(255,((c>>16)&0xFF)+40)<<16) | (Math.min(255,((c>>8)&0xFF)+40)<<8) | Math.min(255,(c&0xFF)+40);
    } else {
      buf32[i] = COLORS[t] || 0xFF000000;
    }
  }
  octx.putImageData(imgData, 0, 0);
  ctx.drawImage(offscreen, 0, 0, W, H, 0, 0, canvas.width, canvas.height);
}

// --- INPUT ---
let drawing=false, resizing=false, resizeStartX=0, resizeStartSize=0;
let currentElement=SAND, lastPaintX=-1, lastPaintY=-1, lastRawX=-1, lastRawY=-1;
const elementMap={sand:SAND,water:WATER,oil:OIL,fire:FIRE,stone:STONE,wood:WOOD,salt:SALT,soil:SOIL,grass_seed:GRASS_SEED,vine_seed:VINE_SEED,tree_seed:TREE_SEED,powder:POWDER,eraser:0};

document.querySelectorAll('.btn[data-el]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.btn[data-el]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentElement=elementMap[btn.dataset.el]??0;
  });
});
document.getElementById('clearBtn').addEventListener('click',()=>{grid.fill(0);sources.fill(0);});

function getBrushSize(){return parseInt(document.getElementById('brushSize').value);}
const isSeedType=(t)=>t===GRASS_SEED||t===VINE_SEED||t===TREE_SEED;

function paintAt(cx,cy){
  const r=getBrushSize();
  const isSource=document.getElementById('sourceMode').checked;
  const erasing=currentElement===0;
  const sparse=isSeedType(currentElement);
  if(r===0){
    if(cx>=0&&cx<W&&cy>=0&&cy<H){
      if(sparse&&rng()>0.15)return;
      const i=cy*W+cx;
      if(isSource){sources[i]=currentElement;if(grid[i]===EMPTY||currentElement===OIL)grid[i]=currentElement;}
      else if(erasing){grid[i]=EMPTY;sources[i]=0;}
      else if(currentElement===WOOD||currentElement===STONE||currentElement===OIL)grid[i]=currentElement;
      else if(grid[i]===EMPTY||currentElement===FIRE)grid[i]=currentElement;
    }
    return;
  }
  for(let dx=-r;dx<=r;dx++)for(let dy=-r;dy<=r;dy++){
    if(dx*dx+dy*dy>r*r)continue;
    if(sparse&&rng()>0.15)continue;
    const px=cx+dx,py=cy+dy;
    if(px>=0&&px<W&&py>=0&&py<H){
      const i=py*W+px;
      if(isSource){sources[i]=currentElement;if(grid[i]===EMPTY||currentElement===OIL)grid[i]=currentElement;}
      else if(erasing){grid[i]=EMPTY;sources[i]=0;}
      else if(currentElement===WOOD||currentElement===STONE||currentElement===OIL)grid[i]=currentElement;
      else if(grid[i]===EMPTY||currentElement===FIRE)grid[i]=currentElement;
    }
  }
}

function paint(ex,ey){
  const rect=canvas.getBoundingClientRect();
  const cx=(ex-rect.left)/SCALE|0, cy=(ey-rect.top)/SCALE|0;
  if(lastPaintX>=0){
    const dx=cx-lastPaintX,dy=cy-lastPaintY;
    const steps=Math.max(Math.abs(dx),Math.abs(dy));
    for(let s=0;s<=steps;s++){const t=steps?s/steps:0;paintAt(lastPaintX+(dx*t)|0,lastPaintY+(dy*t)|0);}
  } else paintAt(cx,cy);
  lastPaintX=cx;lastPaintY=cy;
}

function updateCursor(x,y){
  const r=getBrushSize(),d=Math.max((r*2+1)*SCALE,SCALE);
  cursorEl.style.left=x+'px';cursorEl.style.top=y+'px';
  cursorEl.style.width=d+'px';cursorEl.style.height=d+'px';
  const c=COLORS[currentElement]||0xFF000000;
  const cr=(c>>16)&0xFF,cg=(c>>8)&0xFF,cb=c&0xFF;
  cursorEl.style.borderColor=currentElement===0?'rgba(255,100,100,0.8)':`rgba(${cb},${cg},${cr},0.9)`;
}

canvas.addEventListener('mousedown',e=>{
  if(e.ctrlKey||e.metaKey){resizing=true;resizeStartX=e.clientX;resizeStartSize=getBrushSize();return;}
  drawing=true;lastPaintX=-1;lastPaintY=-1;lastRawX=e.clientX;lastRawY=e.clientY;paint(e.clientX,e.clientY);
});
canvas.addEventListener('mousemove',e=>{
  updateCursor(e.clientX,e.clientY);
  if(resizing){document.getElementById('brushSize').value=Math.max(0,Math.min(20,resizeStartSize+Math.round((e.clientX-resizeStartX)/8)));updateCursor(e.clientX,e.clientY);return;}
  if(drawing){lastRawX=e.clientX;lastRawY=e.clientY;paint(e.clientX,e.clientY);}
});
canvas.addEventListener('mouseup',()=>{drawing=false;resizing=false;lastPaintX=-1;lastPaintY=-1;});
canvas.addEventListener('mouseleave',()=>{drawing=false;resizing=false;lastPaintX=-1;lastPaintY=-1;cursorEl.style.display='none';});
canvas.addEventListener('mouseenter',e=>{cursorEl.style.display='block';updateCursor(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;lastPaintX=-1;lastPaintY=-1;lastRawX=e.touches[0].clientX;lastRawY=e.touches[0].clientY;paint(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(drawing){lastRawX=e.touches[0].clientX;lastRawY=e.touches[0].clientY;paint(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
canvas.addEventListener('touchend',()=>{drawing=false;lastPaintX=-1;lastPaintY=-1;});

// --- LOOP ---
function loop(){
  if(drawing&&lastRawX>=0){const rect=canvas.getBoundingClientRect();paintAt((lastRawX-rect.left)/SCALE|0,(lastRawY-rect.top)/SCALE|0);}
  simulate();
  render();
  requestAnimationFrame(loop);
}
resize();
loop();
</script>
</body>
